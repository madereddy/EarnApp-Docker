name: Build and Push to Dockerhub
on:
  push:
    branches: [ "master", "test" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get EarnApp version
        id: version
        run: |
          VERSION=$(wget -qO- https://brightdata.com/static/earnapp/install.sh \
            | grep VERSION= | cut -d'"' -f2)
          if [ -z "$VERSION" ]; then
            echo "[ERROR] Failed to resolve EarnApp version"
            exit 1
          fi
          echo "value=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build & Push (master)
        if: github.ref == 'refs/heads/master'
        uses: docker/build-push-action@v6
        with:
          context: build/lite
          file: build/lite/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          build-args: |
            EARNAPP_VERSION=${{ steps.version.outputs.value }}
            BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            VCS_REF=${{ github.sha }}
          tags: |
            madereddy/earnapp:latest
            madereddy/earnapp:${{ steps.version.outputs.value }}

      - name: Build & Push (test)
        if: github.ref == 'refs/heads/test'
        uses: docker/build-push-action@v6
        with:
          context: build/lite
          file: build/lite/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          build-args: |
            EARNAPP_VERSION=${{ steps.version.outputs.value }}
            BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            VCS_REF=${{ github.sha }}
          labels: |
            org.opencontainers.image.description=WARNING: test build, not for production use
          tags: |
            madereddy/earnapp:test

      - name: Update Docker Hub Readme
        if: github.ref == 'refs/heads/master'
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          repository: madereddy/earnapp
          short-description: UNOFFICIAL image for BrightData's EarnApp.
          readme-filepath: DOCKERHUB_README.md
