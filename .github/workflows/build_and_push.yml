name: "Build and Push to Docker Hub"

on:
  push:
    branches:
      - master
      - test
  schedule:
    - cron: "0 9 * * 1"

permissions:
  contents: read

jobs:
  build:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get EarnApp version
        id: version
        run: |
          VERSION=$(wget -qO- https://brightdata.com/static/earnapp/install.sh \
            | grep VERSION= | cut -d'"' -f2)
          if [ -z "$VERSION" ]; then
            echo "[ERROR] Failed to resolve EarnApp version"
            exit 1
          fi
          echo "value=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build and push (master)
        if: github.ref == 'refs/heads/master'
        uses: docker/build-push-action@v6
        with:
          context: build/lite
          file: build/lite/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          build-args: |
            EARNAPP_VERSION=${{ steps.version.outputs.value }}
            BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            VCS_REF=${{ github.sha }}
          tags: |
            madereddy/earnapp:latest
            madereddy/earnapp:${{ steps.version.outputs.value }}

      - name: Build and push (test)
        if: github.ref == 'refs/heads/test'
        uses: docker/build-push-action@v6
        with:
          context: build/lite
          file: build/lite/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          build-args: |
            EARNAPP_VERSION=${{ steps.version.outputs.value }}
            BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            VCS_REF=${{ github.sha }}
          labels: |
            org.opencontainers.image.description=WARNING: test build, not for production use
          tags: |
            madereddy/earnapp:test

      - name: Update Docker Hub README
        if: github.ref == 'refs/heads/master'
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: madereddy/earnapp
          short-description: UNOFFICIAL image for BrightData's EarnApp.
          readme-filepath: README.md

  prune-dockerhub:
    runs-on: ubuntu-latest
    needs: build
    if: |
      always() &&
      (github.event_name == 'push' && needs.build.result == 'success') ||
      github.event_name == 'schedule'
    steps:
      - name: Prune old versioned tags from Docker Hub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          # Get auth token
          TOKEN=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"${DOCKERHUB_USERNAME}\",\"password\":\"${DOCKERHUB_TOKEN}\"}" \
            https://hub.docker.com/v2/users/login/ | jq -r .token)

          # Keep latest and test always, keep 10 most recent versioned tags
          TAGS=$(curl -s \
            -H "Authorization: JWT ${TOKEN}" \
            "https://hub.docker.com/v2/repositories/madereddy/earnapp/tags/?page_size=100&ordering=last_updated" \
            | jq -r '.results[] | select(.name | IN("latest", "test") | not) | .name' \
            | tail -n +11)

          if [ -z "$TAGS" ]; then
            echo "No tags to prune."
            exit 0
          fi

          for TAG in $TAGS; do
            echo "Deleting tag: $TAG"
            curl -s -X DELETE \
              -H "Authorization: JWT ${TOKEN}" \
              "https://hub.docker.com/v2/repositories/madereddy/earnapp/tags/${TAG}/"
          done
