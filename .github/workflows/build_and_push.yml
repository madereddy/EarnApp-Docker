name: "Build and Push to Docker Hub"

on:
  push:
    branches:
      - master
      - test

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Restore Buildx local cache
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: buildx-local-cache-${{ steps.version.outputs.version }}

      - name: Read EarnApp version
        id: version
        run: |
          if [ ! -f ".earnapp-version" ]; then
            echo "[ERROR] .earnapp-version file not found"
            exit 1
          fi
          VERSION=$(tr -d '\n' < .earnapp-version)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Set image tags
        id: tags
        run: |
          VERSION=${{ steps.version.outputs.version }}
          if [[ "${GITHUB_REF}" == "refs/heads/master" ]]; then
            echo "tags=madereddy/earnapp:latest,madereddy/earnapp:${VERSION}" >> $GITHUB_OUTPUT
          else
            echo "tags=madereddy/earnapp:test,madereddy/earnapp:${VERSION}" >> $GITHUB_OUTPUT
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: build/lite
          file: build/lite/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          build-args: |
            EARNAPP_VERSION=${{ steps.version.outputs.version }}
            BUILD_DATE=${{ steps.version.outputs.date }}
            VCS_REF=${{ github.sha }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: |
            type=registry,ref=madereddy/earnapp:cache
            type=local,src=/tmp/.buildx-cache
          cache-to: |
            type=registry,ref=madereddy/earnapp:cache,mode=max
            type=local,dest=/tmp/.buildx-cache,mode=max

      - name: Save Buildx local cache
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: buildx-local-cache-${{ steps.version.outputs.version }}

      - name: Update Docker Hub README
        if: github.ref == 'refs/heads/master'
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: madereddy/earnapp
          short-description: UNOFFICIAL image for BrightData's EarnApp.
          readme-filepath: README.md

  prune-dockerhub:
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.result == 'success' && github.ref == 'refs/heads/master'
    steps:
      - name: Prune old versioned tags from Docker Hub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          TOKEN=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"${DOCKERHUB_USERNAME}\",\"password\":\"${DOCKERHUB_TOKEN}\"}" \
            https://hub.docker.com/v2/users/login/ | jq -r .token)

          TAGS=$(curl -s \
            -H "Authorization: JWT ${TOKEN}" \
            "https://hub.docker.com/v2/repositories/madereddy/earnapp/tags/?page_size=100&ordering=last_updated" \
            | jq -r '.results[] | select(.name | IN("latest", "test") | not) | .name' \
            | tail -n +11)

          if [ -z "$TAGS" ]; then
            echo "No tags to prune."
            exit 0
          fi

          for TAG in $TAGS; do
            echo "Deleting tag: $TAG"
            curl -s -X DELETE \
              -H "Authorization: JWT ${TOKEN}" \
              "https://hub.docker.com/v2/repositories/madereddy/earnapp/tags/${TAG}/"
          done
